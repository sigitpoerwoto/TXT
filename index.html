<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigit AP Officer - Virtual Assistant</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .chat-container {
            width: 100%;
            max-width: 450px;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 85vh;
        }
        .chat-header {
            background-color: #00A19C;
            color: white;
            padding: 16px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1em;
            display: flex;
            flex-direction: column;
        }
        .chat-header span {
            font-size: 0.8em;
            font-weight: normal;
            opacity: 0.9;
        }
        .chat-messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-color: #f9fbfd;
        }
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.95em;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .message.bot {
            background-color: #e2f0f0;
            color: #004d4a;
            align-self: flex-start;
            border-bottom-left-radius: 0;
        }
        .message.user {
            background-color: #00A19C;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }
        .chat-input {
            display: flex;
            padding: 12px;
            background-color: #ffffff;
            border-top: 1px solid #eee;
        }
        .chat-input input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 20px;
            outline: none;
            font-family: inherit;
        }
        .chat-input button {
            background-color: #00A19C;
            color: white;
            border: none;
            padding: 0 20px;
            margin-left: 8px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .chat-input button:hover {
            background-color: #00827d;
        }
        .btn-link {
            display: inline-block;
            margin-top: 8px;
            padding: 8px 12px;
            background-color: #00A19C;
            color: white !important;
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.9em;
            font-weight: bold;
        }
        .btn-link:hover {
            background-color: #00827d;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        Sigit Petronas AP Officer
        <span>Virtual Assistant</span>
    </div>
    <div class="chat-messages" id="chat-messages">
        <div class="message bot">
            Halo! Saya adalah Virtual Assistant Bapak Sigit. Ada yang bisa saya bantu terkait informasi jadwal penerimaan, alasan penolakan, pengiriman, materai, faktur pajak, NPWP entitas, atau pembayaran invoice hari ini?
        </div>
    </div>
    <div class="chat-input">
        <input type="text" id="user-input" placeholder="Ketik pertanyaan Anda..." autocomplete="off" onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Kirim</button>
    </div>
</div>

<script>
    function addMessage(text, sender) {
        const messagesDiv = document.getElementById('chat-messages');
        const messageEl = document.createElement('div');
        messageEl.classList.add('message', sender);
        messageEl.innerHTML = text;
        messagesDiv.appendChild(messageEl);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }

    function sendMessage() {
        const inputEl = document.getElementById('user-input');
        const text = inputEl.value.trim();
        if (!text) return;

        addMessage(text, 'user');
        inputEl.value = '';

        setTimeout(() => {
            const response = getBotResponse(text.toLowerCase());
            addMessage(response, 'bot');
        }, 500);
    }

    function getBotResponse(input) {
        const contains = (words) => words.some(word => input.includes(word));
        
        // 1. Logika Alasan Penolakan / Tidak Diterima (Diperbarui dengan SCC/SES/GRN)
        if ((contains(['kenapa', 'mengapa', 'alasan']) && contains(['tolak', 'ditolak', 'tidak diterima', 'gagal', 'kembali', 'dikembalikan'])) || contains(['tidak diterima', 'ditolak', 'dikembalikan'])) {
            return "<strong>ALASAN INVOICE DITOLAK / TIDAK DITERIMA:</strong><br><br>" +
                   "Jika invoice Anda dikembalikan atau tidak diterima, hal ini umumnya terkait dengan prosedur <strong>Waktu & Syarat Penerimaan</strong> kami:<br><br>" +
                   "<strong>1. Di Luar Jadwal:</strong> Pengiriman dilakukan melewati <strong>tanggal 20</strong> atau di luar jam kerja (07.00 - 16.00). Invoice harus dikirim antara tanggal 1 s/d 20 setiap bulannya.<br>" +
                   "<strong>2. Dokumen Tidak Lengkap:</strong> Tidak menyertakan dokumen pendukung atau Faktur Pajak PDF dari e-Faktur.<br>" +
                   "<strong>3. Kendala Teknis:</strong> Ukuran lampiran email melebihi batas maksimal <strong>10MB</strong>.<br>" +
                   "<strong>4. Materai/Pajak:</strong> Tidak ada materai Rp 10.000 (untuk tagihan > Rp 5.000.000) atau tanggal Faktur Pajak tidak sama dengan tanggal invoice.<br>" +
                   "<strong>5. Kelengkapan Dokumen Kontrak:</strong> Karena invoice merupakan penagihan terkait kontrak, wajib melampirkan dokumen <strong>SCC (Service Completed Certificate)</strong> yang diawali oleh <strong>SES (Service Entry Sheet)</strong> dari User (untuk tagihan jasa), atau dokumen <strong>GRN (Good Receipt Note)</strong> (untuk tagihan produk/barang). Pastikan angka pada dokumen tersebut <em>tie up</em> (sesuai) dengan nilai pada invoice dan faktur pajak.<br><br>" +
                   "Untuk memastikan detail spesifik penolakan dokumen Anda, silakan hubungi saya langsung melalui tautan berikut:<br><br>" +
                   "<a href='https://teams.microsoft.com/l/chat/0/0?users=sigit.ekobrotoseno@petronas.com.my' target='_blank' class='btn-link'>Tanya Detail via MS Teams</a>";
        }

        // 2. Logika Waktu & Syarat Penerimaan
        if (contains(['kapan', 'waktu', 'jam', 'tanggal', 'jadwal', 'penerimaan', 'terima', 'syarat']) && (contains(['invoice', 'tagihan', 'dokumen']) || input.includes('penerimaan'))) {
            return "<strong>WAKTU & SYARAT PENERIMAAN INVOICE:</strong><br><br>" +
                   "<strong>1. Jadwal:</strong> Vendor mengirimkan invoice antara <strong>tanggal 1 s/d tanggal 20</strong> setiap bulannya. Invoice diterima pada setiap hari kerja (Senin-Jumat) antara pukul <strong>07.00 - 16.00</strong>.<br><br>" +
                   "<strong>2. Syarat Dokumen:</strong> Diwajibkan mengirimkan scan invoice beserta dokumen pendukungnya. Ini termasuk faktur pajak dalam format PDF dari sistem e-faktur.<br><br>" +
                   "<strong>3. Pengiriman:</strong> Dokumen tidak boleh melebihi <strong>10MB</strong> dan dikirimkan terlebih dahulu melalui email ke: <strong>sigit.ekobrotoseno@petronas.com</strong>.";
        }
        
        // 3. Logika Pengiriman Email / Dokumen (Spesifik)
        if (contains(['email', 'scan', 'pdf', 'ukuran', 'format']) || (contains(['kirim', 'invoice']) && contains(['kemana', 'dimana', 'ke siapa']))) {
            return "<strong>FORMAT & PENGIRIMAN:</strong><br>Mohon kirimkan scan invoice beserta dokumen pendukung (termasuk faktur pajak format PDF dari sistem e-faktur) dengan ukuran dokumen <strong>tidak melebihi 10MB</strong> ke email: <strong>sigit.ekobrotoseno@petronas.com</strong>.";
        }
        
        // 4. Logika Materai
        if (contains(['materai', 'stamp', 'bea', 'matrai'])) {
            return "<strong>KETENTUAN MATERAI:</strong><br>Seluruh invoice dengan jumlah <strong>lebih dari Rp 5.000.000</strong> wajib dibubuhkan materai <strong>Rp 10.000</strong>.";
        }
        
        // 5. Logika Faktur Pajak
        if (contains(['faktur', 'pajak', 'e-faktur', 'efaktur'])) {
            return "<strong>FAKTUR PAJAK:</strong><br>Tanggal Faktur Pajak <strong>harus sama</strong> dengan tanggal invoice. Tanggal tersebut juga harus berada dalam bulan yang sama dengan tanggal diterimanya invoice yang sah dan lengkap oleh Petronas.";
        }
        
        // 6. Logika Pembayaran
        if (contains(['bayar', 'pembayaran', 'termin', 'cair'])) {
            return "<strong>JADWAL PEMBAYARAN:</strong><br>Invoice akan dibayar <strong>30 hari</strong> sejak diterima oleh Finance Department. Pembayaran terakhir dilakukan pada <strong>tanggal 25 setiap bulannya</strong> (atau hari kerja terakhir sebelum tanggal 25 jika jatuh pada Hari Libur Nasional).";
        }
        
        // 7. Logika Status Invoice / Bukti Transfer
        if (contains(['status', 'bukti', 'transfer', 'slip'])) {
            return "<strong>STATUS & BUKTI TRANSFER:</strong><br>Untuk menanyakan status invoice atau meminta bukti transfer, silakan kirim email ke <strong>sigit.ekobrotoseno@petronas.com</strong>. Kami akan merespon paling lambat hari kerja terakhir pada minggu pertanyaan diajukan.";
        }
        
        // 8. Logika SSP & Bukti Potong
        if (contains(['ssp', 'bukti potong', 'withholding'])) {
            return "<strong>SSP & BUKTI POTONG:</strong><br>Untuk permintaan SSP dan Bukti Potong, mohon kirim email ke:<br>- hanifah.nabillah@petronas.com.my<br>- zhafirahamanda.putri@petronas.com.my<br>- winna.meirita@petronas.com.my";
        }
        
        // 9. Logika NPWP & Alamat Entitas
        if (contains(['npwp', 'alamat', 'entitas', 'pt', 'perusahaan'])) {
            return "<strong>ALAMAT PENGIRIMAN:</strong><br>TALAVERA SUITE LANTAI 3-TALAVERA OFFICE PARK,<br>JALAN LETJEN TB. SIMATUPANG KAV.22-26, CILANDAK BARAT, JAKARTA SELATAN, DKI JAKARTA - 12430<br><br>" +
                   "<strong>DAFTAR NPWP ENTITAS:</strong><br>" +
                   "• PC KETAPANG LTD. (02.058.649.1-081.000)<br>" +
                   "• NATUNA 1 B.V. (02.058.639.2-081.000)<br>" +
                   "• PETRONAS CARIGALI JABUNG LTD (01.808.585.2-081.000)<br>" +
                   "• PC KETAPANG II LTD (02.914.104.1-081.000)<br>" +
                   "• PC MADURA LTD (02.072.304.5-081.000)<br>" +
                   "• PC MURIAH LTD (02.072.052.0-081.000)<br>" +
                   "• PC NORTH MADURA II LTD (73.810.523.8-081.000)<br>" +
                   "• PC SAKAKEMANG BV (86.662.189.9-081.000)<br>" +
                   "• PETRONAS ANDAMAN III INDONESIA B.V. (93.745.630.9-016.000)<br>" +
                   "• PETRONAS CARIGALI (KETAPANG) LTD. (02.058.649.1-081.000)<br>" +
                   "• PETRONAS E&P BOBARA SDN. BHD. (20.366.997.3-081.000)<br>" +
                   "• PETRONAS ENERGY BINAIYA SDN BHD (1000 0000 0487 1748)<br>" +
                   "• PETRONAS ENERGY SERPANG SDN BHD (1000 0000 0486 5354)<br>" +
                   "• PETRONAS MASELA SDN. BHD. (39.807.587.9-081.000)<br>" +
                   "• PETRONAS NORTH KETAPANG SDN. BHD. (60.549.851.8-081.000)";
        }
        
        // 10. Logika Kontak & Tim Teams
        if (contains(['kontak', 'hubungi', 'koordinasi', 'teams', 'chat'])) {
            return "Untuk koordinasi lebih cepat, silakan tinggalkan pesan melalui email ke <strong>sigit.ekobrotoseno@petronas.com</strong> atau langsung klik tautan berikut untuk mengirimkan pesan via Microsoft Teams.<br><br>" + 
                   "<a href='https://teams.microsoft.com/l/chat/0/0?users=sigit.ekobrotoseno@petronas.com.my' target='_blank' class='btn-link'>Chat via MS Teams</a>";
        }
        
        // Fallback Response (Jika pertanyaan tidak terdeteksi)
        return "Mohon maaf, sistem tidak dapat mengenali pertanyaan tersebut secara otomatis. Saat ini Bapak Sigit sedang tidak berada di meja.<br><br>" +
               "Untuk koordinasi lebih cepat terkait alasan penolakan spesifik atau informasi lainnya, silakan klik tautan di bawah ini untuk meninggalkan pesan secara langsung. Beliau akan segera merespon setelah kembali.<br><br>" +
               "<a href='https://teams.microsoft.com/l/chat/0/0?users=sigit.ekobrotoseno@petronas.com.my' target='_blank' class='btn-link'>Chat via MS Teams</a>";
    }
</script>

</body>
</html>
